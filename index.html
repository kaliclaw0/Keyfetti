<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#FF6B6B" />
  <meta name="description" content="Kids typing game - press letters and watch them pop!" />
  <title>Keyfetti Typing</title>
  
  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
  
  <!-- PWA -->
  <link rel="apple-touch-icon" href="/icon-192.png" />
</head>
<body>
  <div class="game" id="game" tabindex="0" aria-label="Kids typing area — press keys A to Z">
    <!-- Stats Panel -->
    <div class="stats-panel" id="statsPanel">
      <div class="stat">
        <span class="stat-value" id="letterCount">0</span>
        <span class="stat-label">Letters</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="wpm">0</span>
        <span class="stat-label">WPM</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="streak">0</span>
        <span class="stat-label">Streak</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="highScore">0</span>
        <span class="stat-label">Best</span>
      </div>
    </div>

    <div class="controls">
      <button id="restartBtn" title="Restart">🔄</button>
      <button id="toggleBtn" title="Toggle letters/all">🔠</button>
      <button id="modeBtn" title="Game Mode">🎮</button>
      <button id="darkModeBtn" title="Dark Mode">🌙</button>
      <button id="soundBtn" title="Sound On">🔊</button>
    </div>
    
    <!-- Mode Selector -->
    <div class="mode-selector" id="modeSelector">
      <button class="mode-btn active" data-mode="free">🔤 Free Type</button>
      <button class="mode-btn" data-mode="challenge">⏱️ Challenge</button>
      <button class="mode-btn" data-mode="words">📝 Words</button>
    </div>
    
    <!-- Challenge Timer -->
    <div class="challenge-timer" id="challengeTimer">
      <span id="timerDisplay">60</span>s
    </div>
    
    <!-- Word Challenge -->
    <div class="word-challenge" id="wordChallenge">
      <span id="targetWord">TYPE THIS</span>
    </div>
    
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>
    
    <!-- Floating particles background -->
    <div class="particles" id="particles"></div>

    <div class="pop-layer" id="popLayer" aria-hidden="true"></div>

    <main class="stage" role="region" aria-live="polite" id="introStage">
      <h1>Type letters — watch them pop!</h1>
      <p class="lead">Press keys A–Z on your keyboard. Letters pop in the middle, burst confetti, then float into the document below.</p>
      <div style="opacity:0.9;font-size:14px">Tip: click anywhere to ensure the page has focus to the typing area.</div>
    </main>

    <!-- On-screen keyboard for mobile -->
    <div class="mobile-keyboard" id="mobileKeyboard">
      <div class="keyboard-row">
        <button class="key-btn" data-key="Q">Q</button>
        <button class="key-btn" data-key="W">W</button>
        <button class="key-btn" data-key="E">E</button>
        <button class="key-btn" data-key="R">R</button>
        <button class="key-btn" data-key="T">T</button>
        <button class="key-btn" data-key="Y">Y</button>
        <button class="key-btn" data-key="U">U</button>
        <button class="key-btn" data-key="I">I</button>
        <button class="key-btn" data-key="O">O</button>
        <button class="key-btn" data-key="P">P</button>
      </div>
      <div class="keyboard-row">
        <button class="key-btn" data-key="A">A</button>
        <button class="key-btn" data-key="S">S</button>
        <button class="key-btn" data-key="D">D</button>
        <button class="key-btn" data-key="F">F</button>
        <button class="key-btn" data-key="G">G</button>
        <button class="key-btn" data-key="H">H</button>
        <button class="key-btn" data-key="J">J</button>
        <button class="key-btn" data-key="K">K</button>
        <button class="key-btn" data-key="L">L</button>
      </div>
      <div class="keyboard-row">
        <button class="key-btn" data-key="Z">Z</button>
        <button class="key-btn" data-key="X">X</button>
        <button class="key-btn" data-key="C">C</button>
        <button class="key-btn" data-key="V">V</button>
        <button class="key-btn" data-key="B">B</button>
        <button class="key-btn" data-key="N">N</button>
        <button class="key-btn" data-key="M">M</button>
      </div>
    </div>

    <div class="document" id="document" role="document" aria-live="polite"></div>
    <input id="mobileInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>

  <script type="module" src="/main.js"></script>
  
  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
